name: 极简回测引擎

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行回测
        run: python backtest.py > latest_summary.txt

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            latest_summary.txt
            outputs/**
