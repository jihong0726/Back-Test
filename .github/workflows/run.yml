name: Backtest

on:
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy requests

      - name: Run backtest
        run: python backtest.py

      - name: Show generated files
        run: |
          echo "=== root ==="
          ls -lah
          echo "=== reports ==="
          ls -lah reports || true

      - name: Upload latest summary
        uses: actions/upload-artifact@v4
        with:
          name: latest-summary
          path: latest_summary.txt

      - name: Upload reports folder
        uses: actions/upload-artifact@v4
        with:
          name: backtest-reports
          path: reports/

      - name: Zip reports
        run: zip -r backtest_reports.zip reports latest_summary.txt

      - name: Upload zip package
        uses: actions/upload-artifact@v4
        with:
          name: backtest-package
          path: backtest_reports.zip
