name: Backtest

on:
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo files before run
        run: |
          echo "=== BEFORE RUN: root ==="
          pwd
          ls -lah
          echo ""
          echo "=== BEFORE RUN: workflow files ==="
          find .github -maxdepth 3 -type f | sort || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Run backtest
        run: python backtest.py

      - name: Show generated files after run
        run: |
          echo "=== AFTER RUN: root ==="
          ls -lah
          echo ""
          echo "=== AFTER RUN: reports ==="
          ls -lah reports || true
          echo ""
          echo "=== AFTER RUN: find important files ==="
          find . -maxdepth 2 -type f | sort
          echo ""
          echo "=== generated_files.json ==="
          cat generated_files.json || echo "generated_files.json not found"

      - name: Verify expected root files
        run: |
          for f in \
            latest_summary.txt \
            best_strategies.csv \
            overall_ranking.csv \
            all_strategy_details.csv \
            market_snapshots.json \
            generated_files.json \
            backtest_package.zip
          do
            if [ -f "$f" ]; then
              echo "[FOUND] $f"
            else
              echo "[MISSING] $f"
            fi
          done

      - name: Verify reports files
        run: |
          if [ -d "reports" ]; then
            echo "[FOUND] reports directory"
            find reports -maxdepth 2 -type f | sort
          else
            echo "[MISSING] reports directory"
          fi

      - name: Upload latest summary
        uses: actions/upload-artifact@v4
        with:
          name: latest-summary
          path: latest_summary.txt
          if-no-files-found: warn

      - name: Upload root result files
        uses: actions/upload-artifact@v4
        with:
          name: backtest-root-files
          path: |
            best_strategies.csv
            overall_ranking.csv
            all_strategy_details.csv
            market_snapshots.json
            generated_files.json
            backtest_package.zip
          if-no-files-found: warn

      - name: Upload reports folder
        uses: actions/upload-artifact@v4
        with:
          name: backtest-reports
          path: reports/**
          if-no-files-found: warn

      - name: Build full zip package
        run: |
          rm -f backtest_reports_full.zip
          zip -r backtest_reports_full.zip \
            latest_summary.txt \
            best_strategies.csv \
            overall_ranking.csv \
            all_strategy_details.csv \
            market_snapshots.json \
            generated_files.json \
            backtest_package.zip \
            reports || true
          ls -lah backtest_reports_full.zip || true

      - name: Upload full zip package
        uses: actions/upload-artifact@v4
        with:
          name: backtest-full-package
          path: backtest_reports_full.zip
          if-no-files-found: warn
